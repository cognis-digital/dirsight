apiVersion: apps/v1
kind: Deployment
metadata: { name: dirsight, labels: { app: dirsight } }
spec:
  replicas: 1
  selector: { matchLabels: { app: dirsight } }
  template:
    metadata: { labels: { app: dirsight } }
    spec:
      containers:
        - name: dirsight
          image: ghcr.io/cognis-digital/dirsight:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: dirsight }
spec:
  selector: { app: dirsight }
  ports: [{ port: 80, targetPort: 8000 }]
